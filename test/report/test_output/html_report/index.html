<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Coverage Report</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
    }
    h1, h2 {
      margin-bottom: 0.4rem;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 24px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f5f5f5;
    }
    .muted {
      color: #666;
    }
    .mono {
      font-family: Consolas, monospace;
    }
    .section {
      margin-bottom: 28px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      border: 1px solid #ccc;
      padding: 12px;
      border-radius: 6px;
      background: #fafafa;
    }
    .breadcrumbs a {
      text-decoration: none;
    }
  </style>
</head>
<body>

<h1>Coverage Report</h1>

<div class="section">
  <h2>Root Summary</h2>
  
<div class="summary">
  <div class="card">
    <strong>Line</strong><br>
    0/0 (N/A)
  </div>
  <div class="card">
    <strong>Toggle</strong><br>
    0/0 (N/A)
  </div>
  <div class="card">
    <strong>Branch</strong><br>
    0/0 (N/A)
  </div>
  <div class="card">
    <strong>Expr</strong><br>
    0/0 (N/A)
  </div>
</div>

</div>

<div class="section">
  <h2>Top Modules</h2>
  <table>
    <thead>
      <tr>
        <th>Module</th>
        <th>Line</th>
        <th>Toggle</th>
        <th>Branch</th>
        <th>Expr</th>
      </tr>
    </thead>
    <tbody>
      
<tr>
  <td><a href="modules/top.html">top</a></td>
  <td>1/1</td>
  <td>12/16</td>
  <td>2/2</td>
  <td>2/2</td>
</tr>

    </tbody>
  </table>
</div>

</body>
</html>
